<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blooming Love</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%;
            background: radial-gradient(circle at center, #FFF0F5, #FFCDD2, #FFE0B2);
            font-family: 'Inter', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Desktop scroll */
        @media (min-width: 768px) {
            body, html { height: 200vh; overflow-x: hidden; overflow-y: auto; }
        }
        
        /* Mobile swipe */
        @media (max-width: 767px) {
            body, html { height: 100%; overflow: hidden; }
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .ui-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            pointer-events: none;
        }

        .text-container {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
        }

        .reveal-text {
            opacity: 0;
            font-size: clamp(18px, 5vw, 28px);
            color: #AD1457;
            font-style: italic;
            transform: translateY(20px);
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.5);
        }

        .instructions {
            position: absolute;
            bottom: 60px; left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: #E91E8C;
            opacity: 0.7;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* Nav Elements */
        .back-btn {
            position: absolute; top: 30px; left: 30px;
            color: #AD1457; text-decoration: none; font-weight: 600; font-size: 14px;
            display: flex; align-items: center; gap: 5px; opacity: 0.8; pointer-events: auto;
        }
        .back-btn:hover { opacity: 1; }

        .dot-nav {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; pointer-events: auto; align-items: center;
        }
        .dot { 
            width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid #E91E8C; 
            transition: all 0.3s; text-decoration: none; display: block; 
        }
        .dot.active { width: 10px; height: 10px; background-color: #E91E8C; border: none; }

        @media (max-width: 768px) {
            .back-btn { top: 20px; left: 20px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <a href="index.html" class="back-btn">&#8592; Back</a>

        <div class="text-container">
            <div id="t1" class="reveal-text">Love is...</div>
            <div id="t2" class="reveal-text">unconditional,</div>
            <div id="t3" class="reveal-text">...and it looks just like you, Mom ♥</div>
        </div>

        <div id="instructions" class="instructions">Scroll down to bloom the flower 🌸</div>

        <div class="dot-nav">
            <a href="index.html" class="dot"></a>
            <a href="gallery.html" class="dot"></a>
            <a href="bloom.html" class="dot active"></a>
            <a href="letter.html" class="dot"></a>
            <!-- <a href="musicbox.html" class="dot"></a> -->
        </div>
    </div>

    <!-- CDN Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM Content Loaded');
            if (typeof THREE === 'undefined') {
                console.error('CRITICAL: THREE is not defined. Check CDN.');
                return;
            }
            if (typeof gsap === 'undefined') {
                console.error('CRITICAL: GSAP is not defined. Check CDN.');
                return;
            }
            console.log('Libraries loaded successfully. Initializing scene...');

            let scene, camera, renderer;
            let flowerGroup, petals = [];
            let instancedPetals, petalsAdded = false;
            let bloomProgress = 0;
            const pData = [];

            // UI Elements
            const t1 = document.getElementById('t1');
            const t2 = document.getElementById('t2');
            const t3 = document.getElementById('t3');
            const instructions = document.getElementById('instructions');
            let t1Revealed = false, t2Revealed = false, t3Revealed = false;

            init();
            animate();

            function init() {
                const container = document.getElementById('canvas-container');

                scene = new THREE.Scene();
                
                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
                camera.position.z = 5;

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                // Lighting
                const ambientLight = new THREE.AmbientLight(0xfff3e0, 0.8);
                const dirLight = new THREE.DirectionalLight(0xff80ab, 1.2);
                dirLight.position.set(2, 3, 4);
                const pointLight = new THREE.PointLight(0xffd54f, 0.8, 10);
                pointLight.position.set(0, 1, 2);
                scene.add(ambientLight, dirLight, pointLight);

                // Build Flower
                flowerGroup = new THREE.Group();
                
                const colors = [0xff80ab, 0xf48fb1, 0xffb3c6, 0xff80ab, 0xf06292, 0xffb3c6, 0xf48fb1, 0xff80ab];
                
                colors.forEach((colorHex, i) => {
                    const shape = new THREE.Shape();
                    shape.moveTo(0, 0);
                    shape.bezierCurveTo(-0.3, 0.5, -0.4, 1.2, 0, 1.8);
                    shape.bezierCurveTo(0.4, 1.2, 0.3, 0.5, 0, 0);
                    
                    const geometry = new THREE.ShapeGeometry(shape, 12);
                    const material = new THREE.MeshPhongMaterial({
                        color: new THREE.Color(colorHex),
                        side: THREE.DoubleSide,
                        shininess: 60
                    });
                    
                    const petal = new THREE.Mesh(geometry, material);
                    petal.rotation.order = 'YXZ'; // Important for outward fan
                    petal.rotation.y = i * Math.PI / 4;
                    petal.rotation.x = -1.4;
                    petal.scale.set(0.3, 0.3, 0.3);
                    
                    petals.push(petal);
                    flowerGroup.add(petal);
                });

                // Stem
                const stemGeo = new THREE.CylinderGeometry(0.05, 0.08, 5, 8);
                const stemMat = new THREE.MeshPhongMaterial({ color: 0x66BB6A });
                const stem = new THREE.Mesh(stemGeo, stemMat);
                stem.position.y = -2.5;
                flowerGroup.add(stem);

                // Center
                const centerGeo = new THREE.SphereGeometry(0.2, 16, 16);
                const centerMat = new THREE.MeshPhongMaterial({ color: 0xFFD54F });
                const center = new THREE.Mesh(centerGeo, centerMat);
                flowerGroup.add(center);

                for(let i=0; i<8; i++) {
                    const tinySphere = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), centerMat);
                    const angle = i * Math.PI / 4;
                    tinySphere.position.set(Math.cos(angle)*0.2, 0.1, Math.sin(angle)*0.2);
                    flowerGroup.add(tinySphere);
                }

                flowerGroup.position.y = -0.5;
                scene.add(flowerGroup);
                console.log('Flower built');

                // Falling Petals setup
                const pGeo = new THREE.PlaneGeometry(0.1, 0.15);
                const pMat = new THREE.MeshPhongMaterial({ color: 0xffb3c6, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
                instancedPetals = new THREE.InstancedMesh(pGeo, pMat, 40);
                
                for(let i=0; i<40; i++) {
                    pData.push({
                        x: (Math.random() - 0.5) * 8,
                        y: 5 + Math.random() * 5,
                        z: (Math.random() - 0.5) * 4,
                        speed: 0.01 + Math.random() * 0.02,
                        offset: Math.random() * Math.PI * 2,
                        rx: Math.random(), ry: Math.random()
                    });
                    const dummy = new THREE.Object3D();
                    dummy.position.set(pData[i].x, pData[i].y, pData[i].z);
                    dummy.updateMatrix();
                    instancedPetals.setMatrixAt(i, dummy.matrix);
                }

                // Events
                window.addEventListener('resize', onWindowResize);
                updateInstructionsText();

                // Check initial scroll if loaded mid-page
                if (window.innerWidth >= 768) {
                    bloomProgress = Math.min(window.scrollY / Math.max(document.body.scrollHeight - window.innerHeight, 1), 1) || 0;
                }

                // Desktop Scroll
                window.addEventListener('scroll', () => {
                    if (window.innerWidth >= 768) {
                        bloomProgress = Math.min(window.scrollY / (document.body.scrollHeight - window.innerHeight), 1);
                        updateBloomState();
                    }
                });

                // Mobile Swipe
                let touchStartY = 0;
                window.addEventListener('touchstart', e => { 
                    touchStartY = e.touches[0].clientY; 
                }, {passive: false});
                
                window.addEventListener('touchmove', e => {
                    if (window.innerWidth < 768) {
                        e.preventDefault(); // Stop native scroll bounce
                        const delta = touchStartY - e.touches[0].clientY;
                        bloomProgress = Math.min(Math.max(bloomProgress + delta * 0.002, 0), 1);
                        touchStartY = e.touches[0].clientY;
                        updateBloomState();
                    }
                }, {passive: false});

                // Initial state
                updateBloomState();
            }

            function updateBloomState() {
                // Update Flower
                petals.forEach((petal) => {
                    petal.rotation.x = -1.4 + (bloomProgress * 1.7);
                    const scale = 0.3 + (bloomProgress * 0.7);
                    petal.scale.set(scale, scale, scale);
                });
                
                flowerGroup.rotation.y = bloomProgress * Math.PI * 0.5;
                camera.position.z = 5 - (bloomProgress * 1.5);
                camera.updateProjectionMatrix();

                // Update UI
                instructions.style.opacity = Math.max(0.7 - bloomProgress * 2, 0);

                // Update GSAP Texts
                if (bloomProgress > 0.2 && !t1Revealed) {
                    gsap.to(t1, { opacity: 1, y: 0, duration: 1, ease: 'power2.out' });
                    t1Revealed = true;
                } else if (bloomProgress <= 0.2 && t1Revealed) {
                    gsap.to(t1, { opacity: 0, y: 20, duration: 0.5 });
                    t1Revealed = false;
                }
                
                if (bloomProgress > 0.5 && !t2Revealed) {
                    gsap.to(t2, { opacity: 1, y: 0, duration: 1, ease: 'power2.out' });
                    t2Revealed = true;
                } else if (bloomProgress <= 0.5 && t2Revealed) {
                    gsap.to(t2, { opacity: 0, y: 20, duration: 0.5 });
                    t2Revealed = false;
                }
                
                if (bloomProgress > 0.9 && !t3Revealed) {
                    gsap.to(t3, { opacity: 1, y: 0, duration: 1, ease: 'power2.out' });
                    t3Revealed = true;
                } else if (bloomProgress <= 0.9 && t3Revealed) {
                    gsap.to(t3, { opacity: 0, y: 20, duration: 0.5 });
                    t3Revealed = false;
                }
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                updateInstructionsText();
                
                // Recalculate bloom progress if resizing changes scroll properties
                if (window.innerWidth >= 768) {
                    bloomProgress = Math.min(window.scrollY / Math.max(document.body.scrollHeight - window.innerHeight, 1), 1) || 0;
                    updateBloomState();
                }
            }

            function updateInstructionsText() {
                if (window.innerWidth < 768) {
                    instructions.innerText = "Swipe up to bloom 🌸";
                } else {
                    instructions.innerText = "Scroll down to bloom the flower 🌸";
                }
            }

            function animate() {
                requestAnimationFrame(animate);

                // Falling petals logic
                if (bloomProgress > 0.7) {
                    if (!petalsAdded) {
                        scene.add(instancedPetals);
                        petalsAdded = true;
                    }
                    
                    const time = Date.now() * 0.001;
                    const dummy = new THREE.Object3D();
                    
                    for(let i=0; i<40; i++) {
                        const d = pData[i];
                        d.y -= d.speed;
                        d.x += Math.sin(time * 2 + d.offset) * 0.01;
                        d.rx += 0.02; 
                        d.ry += 0.02;
                        
                        if(d.y < -5) {
                            d.y = 5 + Math.random();
                            d.x = (Math.random() - 0.5) * 8;
                        }
                        
                        dummy.position.set(d.x, d.y, d.z);
                        dummy.rotation.set(d.rx, d.ry, 0);
                        dummy.updateMatrix();
                        instancedPetals.setMatrixAt(i, dummy.matrix);
                    }
                    instancedPetals.instanceMatrix.needsUpdate = true;
                } else if (petalsAdded) {
                    scene.remove(instancedPetals);
                    petalsAdded = false;
                }

                renderer.render(scene, camera);
            }
        });
    </script>
</body>
</html>
