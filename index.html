<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Happy Mother's Day</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  width:100vw; height:100vh;
  overflow:hidden;
  background:#FFF0F3;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

/* ====== SCENE WRAPPER (CSS 3D perspective) ====== */
#scene {
  width:100%; height:100%;
  perspective: 900px;
  perspective-origin: 50% 50%;
  position:relative;
  overflow:hidden;
}

#scene-inner {
  width:100%; height:100%;
  transform-style: preserve-3d;
  position:relative;
  transition: transform 0.1s ease-out;
}

/* ====== BACKGROUND GRADIENT LAYER ====== */
#bg-layer {
  position:absolute; inset:0;
  background: radial-gradient(ellipse at 60% 40%, 
    #FFF5F7 0%, #FFCDD2 45%, #FFB3C6 75%, #F48FB1 100%);
  z-index:1;
}

/* ====== PAPER-CUT LEAF LAYERS ====== */
/* Each layer at different Z — creates REAL depth */
.leaf-layer {
  position:absolute; inset:0;
  z-index:2;
  pointer-events:none;
}

/* Individual leaf shapes using clip-path */
.leaf {
  position:absolute;
  border-radius:50% 0 50% 0;
  transform-style:preserve-3d;
}

/* LAYER 1 — farthest back, lightest */
#layer-1 { transform: translateZ(-80px); opacity:0.4; }
.l1 { background:#FFCDD2; }

/* LAYER 2 */
#layer-2 { transform: translateZ(-55px); opacity:0.55; }
.l2 { background:#F48FB1; }

/* LAYER 3 */
#layer-3 { transform: translateZ(-35px); opacity:0.7; }
.l3 { background:#E91E8C; }

/* LAYER 4 */
#layer-4 { transform: translateZ(-18px); opacity:0.82; }
.l4 { background:#D81B60; }

/* LAYER 5 — closest, darkest */
#layer-5 { transform: translateZ(-5px); opacity:0.92; }
.l5 { background:#AD1457; }

/* ====== MOM SVG SILHOUETTE ====== */
#mom-wrap {
  position:absolute;
  right: -2vw;
  bottom: 0;
  width: min(58vw, 340px);
  height: 88vh;
  z-index: 20;
  pointer-events:none;
  transform-style:preserve-3d;
  transform: translateZ(30px);
  animation: momFloat 6s ease-in-out infinite;
}

@keyframes momFloat {
  0%,100% { transform: translateZ(30px) translateY(0px) rotate(0deg); }
  33%     { transform: translateZ(30px) translateY(-6px) rotate(0.3deg); }
  66%     { transform: translateZ(30px) translateY(-3px) rotate(-0.2deg); }
}

#mom-svg {
  width:100%; height:100%;
  filter: drop-shadow(-12px 8px 24px rgba(173,20,87,0.25));
}

/* ====== TEXT BLOCK ====== */
#text-block {
  position:absolute;
  left: 5vw;
  top:50%;
  transform: translateY(-42%) translateZ(50px);
  z-index:30;
  transform-style:preserve-3d;
  max-width: min(52vw, 270px);
}

.badge {
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(10px);
  border:1px solid rgba(233,30,140,0.2);
  border-radius:30px;
  padding:5px 14px 5px 10px;
  margin-bottom:16px;
  opacity:0;
}

.badge-dot {
  width:6px; height:6px;
  border-radius:50%;
  background:#E91E8C;
  animation: dotPulse 1.5s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.5; transform:scale(0.7); }
}

.badge span {
  font-size:clamp(9px,2.5vw,11px);
  color:#C2185B;
  letter-spacing:0.18em;
  text-transform:uppercase;
  font-weight:600;
}

.main-title {
  font-size:clamp(38px,10vw,72px);
  color:#AD1457;
  font-weight:800;
  line-height:1.0;
  letter-spacing:-0.01em;
  margin-bottom:12px;
  opacity:0;
  text-shadow: 0 2px 30px rgba(255,255,255,0.6);
}

.sub-title {
  font-size:clamp(13px,3.5vw,17px);
  color:#E91E8C;
  opacity:0;
  font-style:italic;
  margin-bottom:28px;
  line-height:1.5;
}

.cta-btn {
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:linear-gradient(135deg,#E91E8C,#C2185B);
  color:white;
  border:none;
  border-radius:50px;
  padding:15px 32px;
  font-size:15px;
  font-weight:600;
  letter-spacing:0.04em;
  text-decoration:none;
  cursor:pointer;
  box-shadow: 0 8px 30px rgba(233,30,140,0.4),
              0 2px 8px rgba(233,30,140,0.2);
  opacity:0;
  position:relative;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  min-height:52px;
}

.cta-btn::before {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);
  border-radius:50px;
}

.cta-btn:active { transform:scale(0.95); }

/* ====== AMBIENT FLOATING FLOWERS ====== */
.ambient-flower {
  position:absolute;
  pointer-events:none;
  z-index:15;
  animation: flowerFloat linear infinite;
  opacity:0;
}

@keyframes flowerFloat {
  0%   { transform:translateY(110vh) rotate(0deg); opacity:0; }
  5%   { opacity:0.7; }
  95%  { opacity:0.7; }
  100% { transform:translateY(-15vh) rotate(360deg); opacity:0; }
}

/* ====== CANVAS (petals) ====== */
#petal-canvas {
  position:absolute;
  inset:0;
  z-index:25;
  pointer-events:none;
}

/* ====== SCROLL HINT ====== */
#scroll-hint {
  position:absolute;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  z-index:50;
  text-align:center;
  opacity:0;
}
#scroll-hint span {
  display:block;
  font-size:10px;
  color:#C2185B;
  letter-spacing:0.18em;
  text-transform:uppercase;
  opacity:0.6;
  margin-bottom:6px;
}
#scroll-hint .arrow {
  font-size:18px;
  color:#E91E8C;
  opacity:0.5;
  animation:arrowBounce 1.5s ease-in-out infinite;
}
@keyframes arrowBounce {
  0%,100%{ transform:translateY(0); }
  50%    { transform:translateY(5px); }
}

/* ====== PAGE DOTS ====== */
.page-dots {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  z-index:200;
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(10px);
  padding:7px 14px;
  border-radius:20px;
  border:1px solid rgba(233,30,140,0.12);
}
.page-dots a {
  width:8px; height:8px;
  border-radius:50%;
  background:rgba(233,30,140,0.25);
  display:block;
  transition:all 0.3s;
}
.page-dots a.active {
  width:20px;
  border-radius:4px;
  background:#E91E8C;
}

/* ====== MOBILE ====== */
@media (max-width:768px) {
  #text-block { 
    max-width:56vw; 
    left:4vw;
  }
  #mom-wrap { 
    width:min(65vw,280px);
    right:-4vw;
  }
}
@media (max-width:400px) {
  #text-block { max-width:58vw; }
  #mom-wrap   { width:70vw; right:-6vw; }
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
// ====== AMBIENT FLOWERS ======
const flowerColors = ['#FF80AB','#F48FB1','#FFB3C6','#E91E8C','#FFCDD2'];
function makeSVGFlower(color, size) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 40 40');
  svg.style.cssText=`width:${size}px;height:${size}px`;
  const c = color;
  const paths = [
    [20,4,20,36],[4,20,36,20],[7,7,33,33],[33,7,7,33]
  ];
  paths.forEach(([x1,y1,x2,y2])=>{
    const e = document.createElementNS(ns,'ellipse');
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const len=Math.hypot(x2-x1,y2-y1)/2;
    e.setAttribute('cx',mx); e.setAttribute('cy',my);
    e.setAttribute('rx',6); e.setAttribute('ry',len);
    e.setAttribute('fill',c);
    e.setAttribute('transform',
      `rotate(${Math.atan2(y2-y1,x2-x1)*180/Math.PI},${mx},${my})`);
    svg.appendChild(e);
  });
  const circle=document.createElementNS(ns,'circle');
  circle.setAttribute('cx',20);circle.setAttribute('cy',20);
  circle.setAttribute('r',5);
  circle.setAttribute('fill','#FFD54F');
  svg.appendChild(circle);
  return svg;
}

for(let i=0;i<8;i++){
  const wrap=document.createElement('div');
  wrap.className='ambient-flower';
  const sz=20+Math.random()*28;
  const color=flowerColors[Math.floor(Math.random()*flowerColors.length)];
  wrap.style.cssText=`
    left:${5+Math.random()*90}vw;
    bottom:-60px;
    animation-duration:${8+Math.random()*12}s;
    animation-delay:-${Math.random()*15}s;
  `;
  wrap.appendChild(makeSVGFlower(color,sz));
  document.getElementById('scene').appendChild(wrap);
}

// ====== FALLING PETALS CANVAS ======
const canvas=document.getElementById('petal-canvas');
const ctx=canvas.getContext('2d');
function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

const pColors=['#FFB3C6','#FFCDD2','#F8BBD0','#FFE0B2','#FFF0F5','#FFCDD2'];
const petals=Array.from({length:55},()=>({
  x:Math.random()*window.innerWidth,
  y:Math.random()*window.innerHeight,
  w:5+Math.random()*9,
  h:8+Math.random()*14,
  rot:Math.random()*Math.PI*2,
  rs:(Math.random()-.5)*0.04,
  vy:0.5+Math.random()*0.8,
  sw:Math.random()*Math.PI*2,
  ss:0.2+Math.random()*0.35,
  color:pColors[Math.floor(Math.random()*pColors.length)],
  op:0.25+Math.random()*0.45
}));

let t=0;
function animPetals(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  t+=0.016;
  petals.forEach(p=>{
    p.y+=p.vy;
    p.x+=Math.sin(t*p.ss+p.sw)*0.7;
    p.rot+=p.rs;
    if(p.y>canvas.height+20){
      p.y=-20; p.x=Math.random()*canvas.width;
    }
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha=p.op;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.ellipse(0,0,p.w/2,p.h/2,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  requestAnimationFrame(animPetals);
}
animPetals();

// ====== GSAP ENTRANCE ANIMATIONS ======
gsap.set(['.badge','.main-title','.sub-title','.cta-btn','#scroll-hint'],
  {opacity:0});

const tl=gsap.timeline({defaults:{ease:'power3.out'}});
tl.to('.badge',    {opacity:1,y:0,from:{y:20},duration:0.7,delay:0.3})
  .to('.main-title',{opacity:1,scale:1,from:{scale:0.85},duration:0.8,ease:'back.out(1.4)'},'-=0.2')
  .to('.sub-title', {opacity:0.75,y:0,from:{y:15},duration:0.6},'-=0.3')
  .to('.cta-btn',   {opacity:1,y:0,from:{y:20},duration:0.6},'-=0.3')
  .to('#scroll-hint',{opacity:1,duration:0.5},'-=0.1');

// ====== 3D TILT ON TOUCH / MOUSE MOVE ======
const inner=document.getElementById('scene-inner');
let targetRX=0,targetRY=0,curRX=0,curRY=0;

function handleMove(nx,ny){
  // nx, ny normalized -1 to 1
  targetRY=nx*6;   // tilt left-right
  targetRX=-ny*4;  // tilt up-down
}

window.addEventListener('mousemove',e=>{
  const nx=(e.clientX/window.innerWidth-.5)*2;
  const ny=(e.clientY/window.innerHeight-.5)*2;
  handleMove(nx,ny);
});

window.addEventListener('deviceorientation',e=>{
  if(e.gamma===null) return;
  const nx=Math.max(-1,Math.min(1,e.gamma/20));
  const ny=Math.max(-1,Math.min(1,(e.beta-45)/25));
  handleMove(nx,ny);
},{passive:true});

function tiltLoop(){
  curRX+=(targetRX-curRX)*0.06;
  curRY+=(targetRY-curRY)*0.06;
  inner.style.transform=
    `rotateX(${curRX}deg) rotateY(${curRY}deg)`;
  requestAnimationFrame(tiltLoop);
}
tiltLoop();

// ====== TOUCH RIPPLE on tap ======
document.addEventListener('touchstart',e=>{
  const touch=e.touches[0];
  const ripple=document.createElement('div');
  ripple.style.cssText=`
    position:fixed;
    left:${touch.clientX-30}px;
    top:${touch.clientY-30}px;
    width:60px;height:60px;
    border-radius:50%;
    border:2px solid rgba(233,30,140,0.5);
    pointer-events:none;
    z-index:100;
    animation:rippleOut 0.6s ease-out forwards;
  `;
  document.body.appendChild(ripple);
  setTimeout(()=>ripple.remove(),700);
},{passive:true});

// Add ripple keyframe dynamically
const style=document.createElement('style');
style.textContent=`
  @keyframes rippleOut{
    from{transform:scale(0.5);opacity:1}
    to  {transform:scale(2.5);opacity:0}
  }
`;
document.head.appendChild(style);
</script>
</body>
